<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<title>Face UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  font-family: Arial;
  height: 100vh;
  overflow: hidden;
}

/* BLURRED BACKGROUND CAMERA */
video.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(18px) brightness(0.6);
  transform: scale(1.1);
}

/* DARK OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

/* CENTER CARD (kao mockup ekran) */
.screen {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 320px;
  height: 520px;

  border-radius: 18px;
  overflow: hidden;

  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(10px);

  display: flex;
  flex-direction: column;
}

/* INNER CAMERA (real feed, ne blur) */
video.feed {
  width: 100%;
  height: 65%;
  object-fit: cover;
}

/* FACE AREA VISUAL */
.scan {
  position: absolute;
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120px;
  height: 140px;
  border-radius: 50%;

  border: 2px solid rgba(255,255,255,0.1);
  opacity: 0.4;
}

/* STATUS CARD */
.card {
  margin: 14px;
  padding: 14px;

  border-radius: 12px;
  backdrop-filter: blur(10px);

  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* STATES */
.known { background: rgba(34,197,94,0.2); color: #4ade80; }
.unknown { background: rgba(239,68,68,0.2); color: #f87171; }
.spoof { background: rgba(239,68,68,0.2); color: #f87171; }
.quality { background: rgba(234,179,8,0.2); color: #facc15; }
.processing { background: rgba(148,163,184,0.15); color: #cbd5e1; }

.title {
  font-size: 18px;
  font-weight: bold;
}

.sub {
  font-size: 12px;
  opacity: 0.8;
}

/* BUTTON */
.btn {
  position: absolute;
  bottom: 20px;
  right: 20px;

  width: 46px;
  height: 46px;
  border-radius: 50%;

  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: white;
}
</style>
</head>

<body>

<!-- blurred background -->
<video class="bg" id="bg" autoplay playsinline></video>
<div class="overlay"></div>

<!-- centered UI card -->
<div class="screen">

  <!-- real camera feed -->
  <video class="feed" id="video" autoplay playsinline></video>

  <div class="scan"></div>

  <!-- status card -->
  <div id="card" class="card processing">
    <div class="title" id="title">Obrada...</div>
    <div class="sub" id="subtitle">Analiza lica</div>
  </div>

  <button class="btn" id="startBtn">⟳</button>

</div>

<script src="camera.js"></script>

</body>
</html>
